<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0e17" />
      <stop offset="100%" stop-color="#06070a" />
    </linearGradient>
    <!-- Neon Glow Gradient -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5a0" />
      <stop offset="50%" stop-color="#00d9f5" />
      <stop offset="100%" stop-color="#7b2ff7" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  <rect width="500" height="500" x="6" y="6" rx="122" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="6"/>
  <!-- Abstract shape: Inner core muscles & checkmark progress ring -->
  <g transform="translate(256, 256)">
    <!-- Outer tracking circle (faded) -->
    <circle r="160" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="24" />
    <!-- Dynamic Glowing Arc (progress) -->
    <path d="M 0,-160 A 160,160 0 1,1 -113,113" fill="none" stroke="url(#glowGrad)" stroke-width="24" stroke-linecap="round" filter="url(#glow)" />
    <!-- Glowing Core Shape (fire + abs style) -->
    <path d="M-60,30 C-60,70 0,90 0,90 C0,90 60,70 60,30 C60,-10 30,-20 0,-70 C-30,-20 -60,-10 -60,30 Z" fill="url(#glowGrad)" opacity="0.15" />
    <!-- Core abstract abs lines -->
    <path d="M-30,-10 L30,-10 M-40,15 L40,15 M-35,40 L35,40 M-20,65 L20,65" stroke="url(#glowGrad)" stroke-width="8" stroke-linecap="round" fill="none" filter="url(#glow)" />
    <!-- Satisfying Checkmark in center -->
    <path d="M-40,0 L-10,30 L60,-40" stroke="#FFFFFF" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)" />
  </g>
</svg>
